# 공용 자재 데이터 내부 서비스
# - 외부 포트 미노출 (expose만, ports 없음)
# - attendance-net 경유 내부 앱 직접 호출
# - nginx 라우트 없음

services:
  material-api:
    build:
      context: .
    image: material-api:latest
    container_name: material-api
    restart: unless-stopped
    env_file: .env.production
    expose:
      - "3020"
    networks:
      - attendance-net
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3020/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  attendance-net:
    external: true
