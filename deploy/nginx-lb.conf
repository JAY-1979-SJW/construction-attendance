# 로드밸런서용 Nginx 설정 (앱 서버 2대 대상)
# /etc/nginx/sites-available/construction-attendance-lb
# sudo ln -s /etc/nginx/sites-available/construction-attendance-lb /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx
#
# 전제: 이 Nginx는 앱 서버 1 또는 별도 LB 서버에서 실행
# APP_SERVER_1: 1.201.176.236:3002
# APP_SERVER_2: <APP_SERVER_2_IP>:3002  ← 실제 IP로 교체 필요

upstream attendance_app {
    # least_conn: 연결 수 기준 분배 (기본: round-robin)
    least_conn;

    server 127.0.0.1:3002       weight=1;  # APP_SERVER_1 (로컬)
    # server <APP_SERVER_2_IP>:3002 weight=1;  # APP_SERVER_2 (교체 후 주석 해제)

    keepalive 32;
}

server {
    listen 80;
    server_name attendance.haehan-ai.kr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name attendance.haehan-ai.kr;

    ssl_certificate     /etc/letsencrypt/live/attendance.haehan-ai.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/attendance.haehan-ai.kr/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 보안 헤더
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # 업로드 제한
    client_max_body_size 10M;

    # 앱 프록시 (upstream으로 분배)
    location / {
        proxy_pass         http://attendance_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;

        # 서버 장애 시 다른 서버로 재시도
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    location /_next/static/ {
        proxy_pass http://attendance_app;
        expires    365d;
        add_header Cache-Control "public, immutable";
    }

    location /public/ {
        proxy_pass http://attendance_app;
        expires    7d;
    }
}
