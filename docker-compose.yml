# 앱 서버용 docker-compose (DB 서버 분리됨)
# DB: 192.168.120.18:5432 (공용 PostgreSQL)
# 파일 저장: /mnt/nas/attendance (NFS 마운트)
# 마이그레이션 기준 서버: APP_SERVER_1 (MIGRATE_ON_START=true)

services:
  attendance-app:
    build:
      context: .
      args:
        NEXT_PUBLIC_KAKAO_MAP_JS_KEY: d10ca24bb7a9f12fec86efd8b68449c7
        NEXT_PUBLIC_APP_NAME: 해한Ai 현장관리
        NEXT_PUBLIC_BASE_URL: https://attendance.haehan-ai.kr
    image: attendance:latest
    container_name: attendance
    restart: unless-stopped
    env_file: .env.production
    ports:
      - "3002:3002"
    volumes:
      - /mnt/nas/attendance/uploads/identity:/app/uploads/identity
      - /mnt/nas/attendance/documents:/app/uploads/documents
      - /mnt/nas/attendance/uploads:/app/uploads
    networks:
      - app_web
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3002/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  app_web:
    external: true
