services:
  attendance-db:
    image: postgres:15-alpine
    container_name: attendance_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-attendance2024}
      POSTGRES_DB: construction_attendance
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app_web
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  attendance-app:
    build: .
    image: attendance:latest
    container_name: attendance
    restart: unless-stopped
    env_file: .env
    ports:
      - "3002:3002"
    volumes:
      - identity_uploads:/app/uploads/identity
      - documents_uploads:/app/uploads/documents
    depends_on:
      attendance-db:
        condition: service_healthy
    networks:
      - app_web
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3002/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  app_web:
    external: true

volumes:
  pgdata:
  identity_uploads:
  documents_uploads:
